<!DOCTYPE html>
<html lang="es">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --azul:#0066FF;--azul-dark:#0044CC;--azul-light:#E8F0FF;
  --verde:#00C853;--verde-light:#E8FFF0;

body{font-family:'Nunito',sans-serif;background:#F0F4FF;color:var(--texto);min-height:100vh;}
#root{min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#0066FF,#0033AA 60%,#001A66);padding:24px;position:relative;overflow:hidden;}

.login-logo{font-size:56px;margin-bottom:8px;position:relative;z-index:1;}
.login-title{font-size:28px;font-weight:900;color:white;margin-bottom:4px;position:relative;z-index:1;}
.login-sub{font-size:14px;color:rgba(255,255,255,0.65);margin-bottom:40px;position:relative;z-index:1;}
.login-card{background:white;border-radius:24px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;z-index:1;}
.login-label{font-size:13px;font-weight:700;color:var(--gris-dark);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.pin-display{display:flex;gap:12px;justify-content:center;margin-bottom:28px;}
.pin-dot{width:52px;height:52px;border-radius:14px;border:2.5px solid #E5E9F2;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:var(--azul);background:var(--azul-light);}
.pin-dot.empty{background:var(--gris);border-color:#E5E9F2;color:transparent;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.num-btn{height:58px;border-radius:14px;border:none;background:var(--gris);font-size:22px;font-weight:800;font-family:'Space Mono',monospace;color:var(--texto);cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.num-btn:active{transform:scale(0.93);background:var(--azul-light);}

.header{background:linear-gradient(135deg,#0066FF,#0044CC);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,66,204,0.3);}
.header-title{font-size:17px;font-weight:900;color:white;}

.ruta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.saldo-box.ok .saldo-num{color:var(--verde);}
.saldo-label{font-size:12px;color:var(--gris-dark);font-weight:700;}
.input-label{font-size:13px;font-weight:800;color:var(--texto);margin-bottom:8px;}
.opcion-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.opcion-btn{flex:1;min-width:60px;padding:14px 6px;border-radius:14px;border:2.5px solid #E5E9F2;background:var(--gris);font-size:13px;font-weight:800;color:var(--gris-dark);cursor:pointer;text-align:center;transition:all 0.2s;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif;}

.opcion-btn.sel-rojo{border-color:var(--rojo);background:var(--rojo-light);color:var(--rojo);}

.input-monto{width:100%;padding:14px 16px;border-radius:12px;border:2.5px solid #E5E9F2;font-size:20px;font-weight:800;font-family:'Space Mono',monospace;color:var(--texto);background:var(--gris);outline:none;}

.resumen-cobro-label{font-size:13px;font-weight:700;color:var(--azul);}
.resumen-cobro-num{font-size:20px;font-weight:900;color:var(--azul);font-family:'Space Mono',monospace;}
.btn-guardar{width:100%;padding:18px;border-radius:16px;border:none;background:linear-gradient(135deg,#0066FF,#0044CC);color:white;font-size:17px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:16px;box-shadow:0 6px 20px rgba(0,102,255,0.35);-webkit-tap-highlight-color:transparent;}

.btn-cancelar{width:100%;padding:14px;border-radius:14px;border:none;background:var(--gris);color:var(--gris-dark);font-size:15px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:10px;}
.tabs{display:flex;background:white;border-radius:16px;padding:6px;margin-bottom:16px;box-shadow:var(--sombra);gap:4px;}
.tab{flex:1;padding:10px 4px;border-radius:12px;border:none;background:transparent;font-size:12px;font-weight:800;color:var(--gris-dark);cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.2s;text-align:center;}
.tab.active{background:var(--azul);color:white;}
.search-box{width:100%;padding:14px 16px;border-radius:14px;border:2.5px solid #E5E9F2;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:white;outline:none;margin-bottom:14px;}
.search-box:focus{border-color:var(--azul);}
.admin-cliente{background:white;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.admin-cliente-info{flex:1;min-width:0;}
.admin-cliente-nombre{font-size:14px;font-weight:800;color:var(--texto);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-cliente-ruta{font-size:12px;color:var(--gris-dark);font-weight:600;}
.btn-editar{background:var(--azul-light);color:var(--azul);border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:800;color:var(--gris-dark);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:2.5px solid #E5E9F2;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--gris);outline:none;color:var(--texto);}
.form-input:focus{border-color:var(--azul);background:var(--azul-light);}
.select-input{width:100%;padding:12px 14px;border-radius:12px;border:2.5px solid #E5E9F2;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:var(--gris);outline:none;color:var(--texto);}
.historial-item{background:var(--gris);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.btn-nuevo{width:100%;padding:16px;border-radius:14px;border:2.5px dashed var(--azul);background:var(--azul-light);color:var(--azul);font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:16px;}
.divider{height:1px;background:#F0F2F8;margin:14px 0;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;color:var(--gris-dark);font-weight:700;gap:14px;}
.spinner{width:36px;height:36px;border:4px solid var(--azul-light);border-top-color:var(--azul);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-dark);font-weight:700;font-size:15px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.fila-dato{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0F2F8;}
.fila-dato:last-child{border-bottom:none;}
.botones-admin{display:flex;gap:10px;margin-bottom:14px;}
.btn-accion{flex:1;padding:13px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:center;border-width:2px;border-style:solid;}
.btn-historial{border-color:var(--azul);background:var(--azul-light);color:var(--azul);}
.btn-reiniciar{border-color:var(--rojo);background:var(--rojo-light);color:var(--rojo);}

<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = 'https://atwikmqtbpeupavgfsoq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qpLgYF143fxiE4xzyZJu1w_brRBSVzh';

async function sb(table, method, body, query) {
  method = method||'GET'; query = query||'';
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+table+query, {
    method,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

const fmt = n => '$'+Number(n||0).toLocaleString('es-CO');
const hoy = () => new Date().toISOString().split('T')[0];

// ============================================================
// GENERAR PDF RESUMEN DEL DIA
// ============================================================
function generarPDF(visitas, clientes, fecha) {
  const rec  = visitas.reduce((s,v)=>s+(v.pago_monto||0),0);
  const fiad = visitas.reduce((s,v)=>s+(v.monto_fiado||0),0);
  const efe  = visitas.filter(v=>v.tipo_pago==='efectivo').reduce((s,v)=>s+(v.pago_monto||0),0);
  const tra  = visitas.filter(v=>v.tipo_pago==='transferencia').reduce((s,v)=>s+(v.pago_monto||0),0);
  const bv   = visitas.filter(v=>v.dejo_botellon&&!v.fue_fiado).reduce((s,v)=>s+(v.cantidad_botellones||1),0);
  const bf   = visitas.filter(v=>v.fue_fiado).reduce((s,v)=>s+(v.cantidad_botellones||1),0);
  const bp   = visitas.filter(v=>v.presto_botellon).length;
  const bt   = bv+bf+bp;

  const filas = visitas.map(v=>{
    const cl  = clientes.find(c=>c.id===v.cliente_id);
    const nom = (cl?cl.nombre:'Cliente').replace(/</g,'&lt;');
    const det = [];
    if (v.dejo_botellon) det.push((v.cantidad_botellones||1)+' bot.');
    if (v.fue_fiado) det.push('FIADO');
    if (v.presto_botellon) det.push('Prestado');
    const color = v.pago_monto>0?'#00C853':'#FF9500';
    const val   = v.pago_monto>0?fmt(v.pago_monto):(v.fue_fiado?'Fiado':'-');
    return `<tr>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;">${nom}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;color:#888;">${v.ruta||''}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;">${det.join(', ')}</td>
      <td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;text-align:right;font-weight:700;color:${color};">${val}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resumen ${fecha}</title>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;color:#1A1F2E;max-width:900px;margin:0 auto;}
    h1{color:#0066FF;margin-bottom:4px;}
    .sub{color:#888;font-size:14px;margin-bottom:20px;}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
    .box{border-radius:10px;padding:14px;text-align:center;}
    .box .num{font-size:28px;font-weight:900;}.box .lbl{font-size:11px;font-weight:700;margin-top:4px;}
    .gv{background:#E8FFF0;color:#00C853;}.gn{background:#FFF8E8;color:#FF9500;}
    .gr{background:#FFF0EF;color:#FF3B30;}.ga{background:#E8F0FF;color:#0066FF;}
    table{width:100%;border-collapse:collapse;margin-bottom:20px;}
    th{background:#0066FF;color:white;padding:8px;font-size:12px;text-align:left;}
    .tot{border-top:2px solid #0066FF;padding-top:14px;}
    .rt{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;}
    .rt.big{font-weight:900;font-size:20px;color:#0066FF;border:none;margin-top:8px;}
    @media print{.noprint{display:none!important;}}
  </style></head><body>
  <h1>Ruta del Agua - Resumen del Dia</h1>
  <p class="sub">Fecha: ${fecha} | Visitas registradas: ${visitas.length}</p>
  <div class="grid">
    <div class="box gv"><div class="num">${bv}</div><div class="lbl">VENDIDOS</div></div>
    <div class="box gn"><div class="num">${bf}</div><div class="lbl">FIADOS</div></div>
    <div class="box gr"><div class="num">${bp}</div><div class="lbl">PRESTADOS</div></div>
    <div class="box ga"><div class="num">${bt}</div><div class="lbl">TOTAL SALIDOS</div></div>
  </div>
  <table><thead><tr><th>Cliente</th><th>Ruta</th><th>Detalle</th><th style="text-align:right">Valor</th></tr></thead>
  <tbody>${filas}</tbody></table>
  <div class="tot">
    <div class="rt"><span>Efectivo</span><span style="color:#00C853;font-weight:700;">${fmt(efe)}</span></div>
    <div class="rt"><span>Transferencias</span><span style="color:#0066FF;font-weight:700;">${fmt(tra)}</span></div>
    <div class="rt"><span>Fiado del dia</span><span style="color:#FF9500;font-weight:700;">${fmt(fiad)}</span></div>
    <div class="rt big"><span>TOTAL RECAUDADO</span><span>${fmt(rec)}</span></div>
  </div>
  <br>
  <button class="noprint" onclick="window.print()" style="background:#0066FF;color:white;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;margin-top:16px;">
    Guardar como PDF / Imprimir
  </button>
  </body></html>`;

  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

// ============================================================
// RESUMEN DIA (compartido vendedor y admin)
// ============================================================
function ResumenDia({ visitas }) {
  const rec  = visitas.reduce((s,v)=>s+(v.pago_monto||0),0);
  const fiad = visitas.reduce((s,v)=>s+(v.monto_fiado||0),0);
  const efe  = visitas.filter(v=>v.tipo_pago==='efectivo').reduce((s,v)=>s+(v.pago_monto||0),0);
  const tra  = visitas.filter(v=>v.tipo_pago==='transferencia').reduce((s,v)=>s+(v.pago_monto||0),0);
  const bv   = visitas.filter(v=>v.dejo_botellon&&!v.fue_fiado).reduce((s,v)=>s+(v.cantidad_botellones||1),0);
  const bf   = visitas.filter(v=>v.fue_fiado).reduce((s,v)=>s+(v.cantidad_botellones||1),0);
  const bp   = visitas.filter(v=>v.presto_botellon).length;
  const bt   = bv+bf+bp;
  return (
    <div>
      <div className="card">
        <div className="card-titulo">Botellones del dia</div>
        <div className="resumen-bot">
          <div className="bot-card bot-verde"><div className="bot-num">{bv}</div><div className="bot-label">VENDIDOS</div></div>
          <div className="bot-card bot-naranja"><div className="bot-num">{bf}</div><div className="bot-label">FIADOS</div></div>

function ModalVisita({ cliente, visitaExistente, onClose, onGuardar }) {
  // Si hay visita existente, precargar sus valores para edicion
  const ve = visitaExistente;
  const tipoPagoInicial = ve ? (ve.fue_fiado?'fiado':ve.tipo_pago) : null;
  const [dejoBot,  setDejoBot]  = React.useState(ve ? ve.dejo_botellon : null);
  const [cantidad, setCantidad] = React.useState(ve ? (ve.cantidad_botellones||1) : 1);
  const [tipoPago, setTipoPago] = React.useState(tipoPagoInicial);
  const [hizAbono, setHizAbono] = React.useState(false);
  const [abono,    setAbono]    = React.useState('');
  const [presto,   setPresto]   = React.useState(ve ? ve.presto_botellon : false);
  const [saving,   setSaving]   = React.useState(false);
  const esEdicion = !!ve;

  const valorBot   = cantidad * cliente.precio;
  const abonoNum   = parseInt(abono)||0;
  const pagado     = (tipoPago==='efectivo'||tipoPago==='transferencia') ? valorBot : 0;
  const totalCobro = pagado + (hizAbono ? abonoNum : 0);
  const esFiado    = dejoBot && tipoPago==='fiado';
  // En edicion: revertir el efecto de la visita anterior antes de calcular la nueva deuda
  const deudaBase  = esEdicion
    ? cliente.deuda_actual
      + (ve.fue_fiado ? (ve.monto_fiado||0) : 0)   // revertir fiado anterior
      + (ve.abono||0)                                // revertir abono anterior
    : cliente.deuda_actual;
  const nuevaDeuda = Math.max(0, deudaBase + (esFiado?valorBot:0) - (hizAbono?abonoNum:0));
  const puedeGuardar = dejoBot===false || (dejoBot===true && tipoPago!==null);

  const guardar = async () => {
    if (!puedeGuardar) return;
    setSaving(true);
    await onGuardar({
      dejo_botellon:       dejoBot||false,
      cantidad_botellones: dejoBot ? cantidad : 0,
      pago_monto:          totalCobro,
      tipo_pago:           tipoPago||'efectivo',
      fue_fiado:           esFiado||false,
      monto_fiado:         esFiado ? valorBot : 0,
      abono:               hizAbono ? abonoNum : 0,
      presto_botellon:     presto,
      nuevaDeuda,
      nuevosPrestados: cliente.botellones_prestados+(presto?1:0)
    });
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-handle"/>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:4}}>
          <div>
            <div className="modal-titulo">{cliente.nombre}</div>
            {esEdicion && <div style={{display:'inline-block',background:'var(--naranja-light)',color:'var(--naranja)',borderRadius:8,padding:'2px 10px',fontSize:12,fontWeight:800,marginTop:4}}>Editando visita de hoy</div>}
          </div>
          {cliente.telefono &&
            <a href={'tel:'+cliente.telefono}
               style={{flexShrink:0,background:'var(--verde)',color:'white',borderRadius:12,padding:'8px 14px',fontSize:13,fontWeight:800,textDecoration:'none'}}>
              {cliente.telefono}
            </a>
          }
        </div>
        <div className="modal-sub">Precio: {fmt(cliente.precio)} · {cliente.ruta}</div>

        <div className={'saldo-box '+(cliente.deuda_actual>0?'deuda':'ok')}>
          <div style={{fontSize:28}}>{cliente.deuda_actual>0?'⚠':'✅'}</div>
          <div>
            <div className="saldo-num">{fmt(cliente.deuda_actual)}</div>
            <div className="saldo-label">Saldo actual</div>
            {cliente.botellones_prestados>0 &&
              <div style={{fontSize:12,color:'var(--naranja)',fontWeight:800,marginTop:2}}>
                {cliente.botellones_prestados} botellon(es) prestado(s)
              </div>
            }
          </div>
        </div>

        <div className="input-label">Dejaste botellon hoy?</div>
        <div className="opcion-row">
          <button className={'opcion-btn'+(dejoBot===true?' sel-azul':'')}    onClick={()=>setDejoBot(true)}>Si deje</button>
          <button className={'opcion-btn'+(dejoBot===false?' sel-naranja':'')} onClick={()=>{ setDejoBot(false); setTipoPago(null); }}>No deje</button>
        </div>

        {dejoBot===true && <>
          <div className="input-label">Cuantos botellones?</div>
          <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center'}}>
            {[1,2,3,4].map(n=>(
              <button key={n}
                className={'opcion-btn'+(cantidad===n?' sel-azul':'')}
                onClick={()=>setCantidad(n)}
                style={{fontSize:18,fontWeight:900,flex:1,padding:'14px 4px'}}>
                {n}
              </button>
            ))}
            <input
              type="number" min="1" max="99"
              value={cantidad}
              onChange={e=>{ const v=parseInt(e.target.value)||1; setCantidad(v>0?v:1); }}
              style={{width:64,padding:'12px 8px',borderRadius:14,border:'2.5px solid '+(![1,2,3,4].includes(cantidad)?'var(--azul)':'#E5E9F2'),
                background:![1,2,3,4].includes(cantidad)?'var(--azul-light)':'var(--gris)',
                fontSize:20,fontWeight:900,fontFamily:"'Space Mono',monospace",textAlign:'center',
                color:![1,2,3,4].includes(cantidad)?'var(--azul)':'var(--texto)',outline:'none',flexShrink:0}}
            />
          </div>
          <div className="input-label">Como pago?</div>
          <div className="opcion-row">
            <button className={'opcion-btn'+(tipoPago==='efectivo'?     ' sel-verde':'')}  onClick={()=>setTipoPago('efectivo')}>Efectivo</button>
            <button className={'opcion-btn'+(tipoPago==='fiado'?        ' sel-naranja':'')} onClick={()=>setTipoPago('fiado')}>Fiado</button>
            <button className={'opcion-btn'+(tipoPago==='transferencia'?' sel-azul':'')}   onClick={()=>setTipoPago('transferencia')}>Transferencia</button>
          </div>
        </>}

        {cliente.deuda_actual>0 && <>
          <div className="divider"/>
          <div className="input-label">El cliente abono a su deuda?</div>
          <div className="opcion-row">
            <button className={'opcion-btn'+(!hizAbono?' sel-verde':'')} onClick={()=>{ setHizAbono(false); setAbono(''); }}>No abono</button>
            <button className={'opcion-btn'+(hizAbono?' sel-azul':'')}   onClick={()=>setHizAbono(true)}>Si abono</button>
          </div>
          {hizAbono && <>
            <div className="input-label">Cuanto abono?</div>
            <input type="number" className="input-monto" placeholder="0" value={abono} onChange={e=>setAbono(e.target.value)}/>
          </>}
        </>}

        <div className="divider"/>
        <div className="input-label">Le prestaste un botellon vacio?</div>
        <div className="opcion-row">
          <button className={'opcion-btn'+(!presto?' sel-verde':'')} onClick={()=>setPresto(false)}>No</button>
          <button className={'opcion-btn'+(presto?' sel-rojo':'')}   onClick={()=>setPresto(true)}>Si preste</button>
        </div>

        {(totalCobro>0||dejoBot!==null) &&
          <div className="resumen-cobro">
            <div>
              <div className="resumen-cobro-label">Cobras hoy</div>
              <div style={{fontSize:11,color:'var(--azul)',fontWeight:600,marginTop:2}}>Nueva deuda: {fmt(nuevaDeuda)}</div>
            </div>
            <div className="resumen-cobro-num">{fmt(totalCobro)}</div>
          </div>
        }

        <button className="btn-guardar" onClick={guardar} disabled={saving||!puedeGuardar}>
          {saving?'Guardando...':'Guardar visita'}
        </button>
        <button className="btn-cancelar" onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

function ModalReiniciarDia({ visitas, clientes, onClose, onReiniciado }) {
  const [pin,     setPin]     = React.useState('');
  const [error,   setError]   = React.useState('');
  const [paso,    setPaso]    = React.useState('pin');
  const [loading, setLoading] = React.useState(false);
  const PIN_OK = '2205';

  const addNum = (n) => {
    if (pin.length>=4) return;
    const np = pin+n;
    setPin(np);
    if (np.length===4) {
      if (np===PIN_OK) { setPaso('confirmar'); setError(''); }
      else { setError('PIN incorrecto'); setPin(''); }
    }
  };

  const confirmar = async () => {
    setLoading(true);
    try {
      generarPDF(visitas, clientes, hoy());
      await new Promise(r=>setTimeout(r,500));
      await sb('visitas','DELETE',null,'?fecha=eq.'+hoy());
      onReiniciado();
    } catch(e) { setError('Error: '+e.message); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-titulo">Reiniciar Dia</div>

        {paso==='pin' ? <>
          <div className="modal-sub">Ingresa el PIN de seguridad para continuar</div>
          <div style={{background:'var(--naranja-light)',borderRadius:12,padding:'14px 16px',marginBottom:20,fontSize:13,color:'var(--naranja)',fontWeight:700,lineHeight:1.6}}>
            Esta accion generara el PDF del dia y borrara el registro de visitas.<br/>
            Los saldos de los clientes NO se modifican.
          </div>
          <div className="pin-display">
            {[0,1,2,3].map(i=><div key={i} className={'pin-dot'+(i<pin.length?'':' empty')}>{i<pin.length?'*':''}</div>)}
          </div>
          <div className="numpad">
            {[1,2,3,4,5,6,7,8,9].map(n=>(
              <button key={n} className="num-btn" onClick={()=>addNum(String(n))}>{n}</button>
            ))}
            <button className="num-btn del" onClick={()=>{ setPin(p=>p.slice(0,-1)); setError(''); }}>DEL</button>
            <button className="num-btn" onClick={()=>addNum('0')}>0</button>
            <button className="num-btn ok">OK</button>
          </div>
          {error && <div className="login-error">{error}</div>}
        </> : <>
          <div className="modal-sub">Confirma el reinicio del dia {hoy()}</div>
          <div style={{background:'var(--verde-light)',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
            <div style={{fontWeight:800,color:'var(--verde)',marginBottom:6}}>Se reinicia:</div>
            <div style={{fontSize:13,color:'var(--verde)'}}>- Registro de visitas del dia</div>
            <div style={{fontWeight:800,color:'var(--rojo)',marginTop:10,marginBottom:6}}>NO se toca:</div>
            <div style={{fontSize:13,color:'var(--rojo)'}}>- Saldo de clientes</div>
            <div style={{fontSize:13,color:'var(--rojo)'}}>- Botellones prestados</div>
            <div style={{fontSize:13,color:'var(--rojo)'}}>- Neveras prestadas</div>
          </div>
          <button className="btn-guardar" onClick={confirmar} disabled={loading}
            style={{background:'linear-gradient(135deg,#FF3B30,#CC2200)'}}>
            {loading?'Generando PDF y reiniciando...':'Confirmar Reinicio del Dia'}
          </button>
          <button className="btn-cancelar" onClick={onClose}>Cancelar</button>
          {error && <div className="login-error" style={{marginTop:10}}>{error}</div>}
        </>}
      </div>
    </div>
  );
}

function ModalHistorial({ clientes, onClose }) {
  const [fi,  setFi]  = React.useState('');
  const [ff,  setFf]  = React.useState('');
  const [cid, setCid] = React.useState('');
  const [res, setRes] = React.useState(null);
  const [loading, setLd] = React.useState(false);

  const buscar = async () => {
    if (!fi||!ff) return;
    setLd(true);
    let q = '?fecha=gte.'+fi+'&fecha=lte.'+ff;
    if (cid) q += '&cliente_id=eq.'+cid;
    const data = await sb('visitas','GET',null, q+'&order=fecha.asc');
    setRes(data||[]);
    setLd(false);
  };

  const totRec     = res ? res.reduce((s,v)=>s+(v.pago_monto||0),0) : 0;
  const totFiad    = res ? res.reduce((s,v)=>s+(v.monto_fiado||0),0) : 0;
  const totBot     = res ? res.filter(v=>v.dejo_botellon).reduce((s,v)=>s+(v.cantidad_botellones||1),0) : 0;
  const totBotFiad = res ? res.filter(v=>v.fue_fiado).reduce((s,v)=>s+(v.cantidad_botellones||1),0) : 0;
  const clSel      = cid ? clientes.find(c=>String(c.id)===String(cid)) : null;

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal" style={{maxHeight:'95vh'}}>
        <div className="modal-handle"/>
        <div className="modal-titulo">Historial por Fechas</div>
        <div className="modal-sub">Consulta cobros y fiados por periodo de tiempo</div>

        <div className="form-group">
          <label className="form-label">Desde</label>
          <input type="date" className="form-input" value={fi} onChange={e=>setFi(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">Hasta</label>
          <input type="date" className="form-input" value={ff} onChange={e=>setFf(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="form-label">Cliente (deja vacio para ver todos)</label>
          <select className="select-input" value={cid} onChange={e=>setCid(e.target.value)}>
            <option value="">Todos los clientes</option>
            {clientes.map(c=>(
              <option key={c.id} value={c.id}>{c.nombre} ({c.ruta})</option>
            ))}
          </select>
        </div>

        <button className="btn-guardar" onClick={buscar} disabled={loading||!fi||!ff}>
          {loading?'Buscando...':'Buscar'}
        </button>

        {res!==null && <div style={{marginTop:20}}>

          {clSel && (
            <div style={{background:'var(--azul-light)',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
              <div style={{fontWeight:900,fontSize:15,color:'var(--azul)'}}>{clSel.nombre}</div>
              <div style={{fontSize:12,color:'var(--azul)',marginTop:4}}>
                {clSel.ruta} &nbsp;·&nbsp; Precio: {fmt(clSel.precio)} &nbsp;·&nbsp; Deuda actual: {fmt(clSel.deuda_actual)}
              </div>
            </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
            <div style={{background:'var(--verde-light)',borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:26,fontWeight:900,color:'var(--verde)'}}>{totBot}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--verde)'}}>BOT. ENTREGADOS</div>
            </div>
            <div style={{background:'var(--naranja-light)',borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:26,fontWeight:900,color:'var(--naranja)'}}>{totBotFiad}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--naranja)'}}>BOT. FIADOS</div>
            </div>
            <div style={{background:'var(--azul-light)',borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:900,color:'var(--azul)'}}>{fmt(totRec)}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--azul)'}}>TOTAL RECAUDADO</div>
            </div>
            <div style={{background:'var(--rojo-light)',borderRadius:12,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:18,fontWeight:900,color:'var(--rojo)'}}>{fmt(totFiad)}</div>
              <div style={{fontSize:11,fontWeight:700,color:'var(--rojo)'}}>TOTAL FIADO</div>
            </div>
          </div>

          <div style={{fontWeight:700,fontSize:13,color:'var(--gris-dark)',marginBottom:10}}>
            {res.length} visitas en el periodo seleccionado
          </div>

          {res.length===0
            ? <div className="empty-state"><div className="empty-icon">📋</div>Sin registros en ese periodo</div>
            : res.map(v=>{
                const cl = clientes.find(c=>c.id===v.cliente_id);
                const det=[];
                if (v.dejo_botellon) det.push((v.cantidad_botellones||1)+' bot.');
                if (v.fue_fiado) det.push('FIADO '+fmt(v.monto_fiado||0));
                if (v.presto_botellon) det.push('Prestado');
                return (
                  <div key={v.id} className="historial-item">
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800,fontSize:13}}>{cl?cl.nombre:'Cliente'}</div>
                      <div style={{fontSize:11,color:'var(--gris-dark)',fontWeight:600}}>{v.fecha} — {v.ruta||''}</div>
                      {det.length>0 && <div style={{fontSize:12,marginTop:2}}>{det.join(' | ')}</div>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      {v.pago_monto>0 && <div style={{fontWeight:900,color:'var(--verde)',fontSize:14}}>{fmt(v.pago_monto)}</div>}
                      {v.fue_fiado   && <div style={{fontWeight:800,color:'var(--naranja)',fontSize:12}}>Fiado</div>}
                    </div>
                  </div>
                );
              })
          }
        </div>}

        <button className="btn-cancelar" style={{marginTop:20}} onClick={onClose}>Cerrar</button>
      </div>
    </div>
  );
}

function ModalCliente({ cliente, rutas, onClose, onGuardar }) {
  const [form, setForm] = React.useState({
    nombre:               cliente?.nombre||'',
    ruta:                 cliente?.ruta||'',
    orden:                cliente?.orden||0,
    precio:               cliente?.precio||5000,
    telefono:             cliente?.telefono||'',
    deuda_actual:         cliente?.deuda_actual||0,
    botellones_prestados: cliente?.botellones_prestados||0,
    neveras:              cliente?.neveras||0,
  });
  const [saving, setSaving] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const guardar = async () => {
    if (!form.nombre||!form.ruta) return;
    setSaving(true);
    await onGuardar({
      nombre:form.nombre, ruta:form.ruta, orden:parseInt(form.orden)||0,
      precio:parseInt(form.precio)||5000, telefono:form.telefono||null,
      deuda_actual:parseInt(form.deuda_actual)||0,
      botellones_prestados:parseInt(form.botellones_prestados)||0,
      neveras:parseInt(form.neveras)||0,
    });
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-titulo">{cliente?'Editar cliente':'Nuevo cliente'}</div>
        <div className="modal-sub" style={{marginBottom:20}}>{cliente?'Modifica los datos del cliente':'Registra un nuevo cliente en la ruta'}</div>

        <div className="form-group">
          <label className="form-label">Ruta</label>
          <select className="select-input" value={form.ruta} onChange={e=>set('ruta',e.target.value)}>
            <option value="">Selecciona ruta...</option>
            {rutas.map(r=><option key={r.id} value={r.nombre}>{r.nombre}</option>)}
          </select>
        </div>
        {[
          {k:'nombre',l:'Nombre completo',t:'text'},
          {k:'orden',l:'Orden en la ruta (posicion)',t:'number'},
          {k:'precio',l:'Precio por botellon',t:'number'},
          {k:'telefono',l:'Telefono (opcional)',t:'text'},
          {k:'deuda_actual',l:'Deuda actual ($)',t:'number'},
          {k:'botellones_prestados',l:'Botellones prestados',t:'number'},
          {k:'neveras',l:'Neveras prestadas',t:'number'},
        ].map(({k,l,t})=>(
          <div key={k} className="form-group">
            <label className="form-label">{l}</label>
            <input className="form-input" type={t} value={form[k]} onChange={e=>set(k,e.target.value)}/>
          </div>
        ))}

        <button className="btn-guardar" onClick={guardar} disabled={saving}>
          {saving?'Guardando...':'Guardar'}
        </button>
        <button className="btn-cancelar" onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

    ]);
    setRutas(rts||[]);
    const c={};
    (cls||[]).forEach(cl=>{ c[cl.ruta]=(c[cl.ruta]||0)+1; });
    setCounts(c);
  };

  const selRuta = async (ruta) => {
    setRutaSel(ruta); setVistaTab('pendientes'); setLoading(true);
    const todos = await sb('clientes','GET',null,'?activo=eq.true&order=orden,nombre');
    setClientes((todos||[]).filter(c=>c.ruta===ruta));
    const vis = await sb('visitas','GET',null,'?fecha=eq.'+hoy()+'&vendedor_id=eq.'+user.id);
    const map={};
    (vis||[]).forEach(v=>{ map[v.cliente_id]=v; });
    setVisitas(map);
    setLoading(false);
  };

  const handleGuardar = async (data) => {
    const c = clienteSel;
    const visData = {
      cliente_id:c.id, vendedor_id:user.id, fecha:hoy(), ruta:rutaSel,
      dejo_botellon:data.dejo_botellon, cantidad_botellones:data.cantidad_botellones,
      pago_monto:data.pago_monto, tipo_pago:data.tipo_pago,
      fue_fiado:data.fue_fiado, monto_fiado:data.monto_fiado,
      presto_botellon:data.presto_botellon, no_estaba:false
    };
    let saved;
    if (visitas[c.id]) {
      const r = await sb('visitas','PATCH',visData,'?id=eq.'+visitas[c.id].id);
      saved=r[0];
    } else {
      const r = await sb('visitas','POST',visData);
      saved=r[0];
    }
    await sb('clientes','PATCH',
      {deuda_actual:data.nuevaDeuda, botellones_prestados:data.nuevosPrestados},
      '?id=eq.'+c.id
    );
    setVisitas(prev=>({...prev,[c.id]:saved}));
    setClientes(prev=>prev.map(cl=>cl.id===c.id?{...cl,deuda_actual:data.nuevaDeuda,botellones_prestados:data.nuevosPrestados}:cl));
    setClienteSel(null);
  };

  const vList      = Object.values(visitas);
  const pendientes = clientes.filter(c=>!visitas[c.id]);
  const visitados  = clientes.filter(c=> visitas[c.id]);
  const lista      = vistaTab==='pendientes' ? pendientes : visitados;

  if (!rutaSel) return (
    <div>
      <div className="header">
        <div>
          <div className="header-title">Ruta del Agua</div>
          <div className="header-sub">Hola, {user.nombre}</div>
        </div>
        <button className="btn-back" onClick={onLogout}>Salir</button>
      </div>
      <div className="page">
        <div className="card">
          <div className="card-titulo">Cual ruta trabajas hoy?</div>
          <div className="ruta-grid">
            {rutas.map(r=>(
              <div key={r.id} className="ruta-btn" onClick={()=>selRuta(r.nombre)}>
                {r.nombre}
                <span className="ruta-count">{counts[r.nombre]||0} clientes</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div className="header">
        <div>
          <div className="header-title">{rutaSel}</div>
          <div className="header-sub">{visitados.length}/{clientes.length} visitados</div>
        </div>
        <button className="btn-back" onClick={()=>setRutaSel(null)}>Rutas</button>
      </div>
      <div className="page">
        {vList.length>0 && <ResumenDia visitas={vList}/>}

        {/* Boton nuevo cliente para el vendedor */}
        {showNuevoCliente && <ModalCliente cliente={null} rutas={rutas} onClose={()=>setShowNuevoCliente(false)} onGuardar={async (datos)=>{
          const nuevo = await sb('clientes','POST',{...datos,activo:true});
          setClientes(prev=>[...prev,nuevo[0]].filter(cl=>cl.ruta===rutaSel).sort((a,b)=>(a.orden||0)-(b.orden||0)));
          setShowNuevoCliente(false);
        }}/>}

        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button className="btn-nuevo" style={{marginBottom:0,flex:1}} onClick={()=>setShowNuevoCliente(true)}>
            + Nuevo cliente en esta ruta
          </button>
        </div>

        <div className="sub-tabs">
          <button className={'sub-tab'+(vistaTab==='pendientes'?' active-pend':'')} onClick={()=>setVistaTab('pendientes')}>
            Pendientes ({pendientes.length})
          </button>
          <button className={'sub-tab'+(vistaTab==='visitados'?' active-vis':'')} onClick={()=>setVistaTab('visitados')}>
            Visitados ({visitados.length})
          </button>
        </div>
        {loading
          ? <div className="loading"><div className="spinner"/><span>Cargando...</span></div>
          : lista.length===0
            ? <div className="empty-state">
                <div className="empty-icon">{vistaTab==='pendientes'?'🎉':'📋'}</div>
                {vistaTab==='pendientes'?'Todos visitados!':'Sin visitas aun'}
              </div>
            : lista.map(c=>{
                const v=visitas[c.id];
                return (
                  <div key={c.id}
                    className={'cliente-item'+(v?' visitado-card':c.deuda_actual>0?' tiene-deuda':'')}
                    onClick={()=>{ if(!v) setClienteSel(c); }}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                        <span style={{flexShrink:0,background:'var(--azul)',color:'white',borderRadius:8,padding:'2px 8px',fontSize:12,fontWeight:900,fontFamily:"'Space Mono',monospace"}}>{c.orden||'?'}</span>
                        <span className="cliente-nombre">{c.nombre}</span>
                      </div>
                      {c.telefono &&
                        <a href={'tel:'+c.telefono} onClick={e=>e.stopPropagation()}
                          style={{flexShrink:0,background:'var(--verde)',color:'white',borderRadius:10,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,textDecoration:'none'}}>
                          📞
                        </a>
                      }
                    </div>
                    <div className="cliente-tags">
                      <span className="tag tag-precio">{fmt(c.precio)}</span>
                      {c.deuda_actual>0
                        ? <span className="tag tag-deuda">Debe {fmt(c.deuda_actual)}</span>
                        : <span className="tag tag-ok">Al dia</span>
                      }
                      {c.botellones_prestados>0 && <span className="tag tag-prestado">{c.botellones_prestados} prestado(s)</span>}
                      {v && <span className="tag tag-ok">Listo</span>}
                    </div>

                    {/* Resumen de la visita de hoy + boton editar */}
                    {v && (
                      <div style={{marginTop:10,background:'var(--gris)',borderRadius:10,padding:'10px 12px'}} onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                          <div>
                            <div style={{fontSize:11,fontWeight:800,color:'var(--gris-dark)',marginBottom:4}}>HOY</div>
                            <div style={{fontSize:13,fontWeight:700,color:'var(--texto)'}}>
                              {v.dejo_botellon
                                ? (v.cantidad_botellones||1)+' botellon(es)'
                                : 'No dejo botellon'}
                            </div>
                            <div style={{fontSize:12,fontWeight:700,marginTop:2,
                              color: v.fue_fiado?'var(--naranja)':v.tipo_pago==='transferencia'?'var(--azul)':'var(--verde)'}}>
                              {v.fue_fiado
                                ? 'Fiado '+fmt(v.monto_fiado||0)
                                : v.tipo_pago==='transferencia'
                                  ? 'Transferencia '+fmt(v.pago_monto||0)
                                  : 'Efectivo '+fmt(v.pago_monto||0)}
                            </div>
                            {v.presto_botellon && <div style={{fontSize:11,color:'var(--rojo)',fontWeight:700,marginTop:2}}>Presto botellon vacio</div>}
                          </div>
                          <button
                            onClick={e=>{ e.stopPropagation(); setClienteSel(c); }}
                            style={{flexShrink:0,background:'var(--naranja)',color:'white',border:'none',borderRadius:10,padding:'8px 12px',fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif"}}>
                            Editar visita
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })
        }
      </div>
      {clienteSel && <ModalVisita
        cliente={clienteSel}
        visitaExistente={visitas[clienteSel.id]||null}
        onClose={()=>setClienteSel(null)}
        onGuardar={handleGuardar}
      />}
    </div>
  );
}

// ============================================================
// ADMIN APP
// ============================================================
function AdminApp({ onLogout }) {
  const [tab,          setTab]         = React.useState('hoy');
  const [clientes,     setClientes]    = React.useState([]);
  const [visitas,      setVisitas]     = React.useState([]);
  const [vendedores,   setVend]        = React.useState([]);
  const [rutas,        setRutas]       = React.useState([]);
  const [loading,      setLoading]     = React.useState(true);
  const [buscar,       setBuscar]      = React.useState('');
  const [clienteEdit,  setClienteEdit] = React.useState(null);
  const [nuevoCliente, setNuevo]       = React.useState(false);
  const [showReinicio,     setShowReinicio]    = React.useState(false);
  const [showHistorial,    setShowHist]        = React.useState(false);
  const [clienteAEliminar, setClienteAEliminar]= React.useState(null);

  React.useEffect(()=>{ cargar(); },[]);

  const cargar = async () => {
    setLoading(true);
    const [cl,vis,vnd,rts] = await Promise.all([
      sb('clientes','GET',null,'?activo=eq.true&order=orden,nombre'),
      sb('visitas','GET',null,'?fecha=eq.'+hoy()+'&order=created_at.desc'),
      sb('vendedores','GET',null,'?activo=eq.true'),
      sb('rutas','GET',null,'?order=nombre')
    ]);
    setClientes(cl||[]); setVisitas(vis||[]); setVend(vnd||[]); setRutas(rts||[]);
    setLoading(false);
  };

  const clFiltrados = clientes.filter(c=>
    c.nombre.toLowerCase().includes(buscar.toLowerCase()) ||
    (c.ruta||'').toLowerCase().includes(buscar.toLowerCase())
  );

  const editarCliente = async (datos) => {
    await sb('clientes','PATCH',datos,'?id=eq.'+clienteEdit.id);
    setClientes(prev=>prev.map(c=>c.id===clienteEdit.id?{...c,...datos}:c));
    setClienteEdit(null);
  };

  const crearCliente = async (datos) => {
    const nuevo = await sb('clientes','POST',{...datos,activo:true});
    setClientes(prev=>[...prev,nuevo[0]]);
    setNuevo(false);
  };

  return (
    <div>
      <div className="header">
        <div>
          <div className="header-title">Panel Admin</div>
          <div className="header-sub">{new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <button className="btn-back" onClick={onLogout}>Salir</button>
      </div>
      <div className="page">

        <div className="tabs">
          <button className={'tab'+(tab==='hoy'?      ' active':'')} onClick={()=>setTab('hoy')}>Hoy</button>
          <button className={'tab'+(tab==='clientes'? ' active':'')} onClick={()=>setTab('clientes')}>Clientes</button>
          <button className={'tab'+(tab==='vendedores'?' active':'')} onClick={()=>setTab('vendedores')}>Vendedores</button>
        </div>

        <div className="botones-admin">
          <button className="btn-accion btn-historial" onClick={()=>setShowHist(true)}>
            Historial por Fechas
          </button>
          <button className="btn-accion btn-reiniciar" onClick={()=>setShowReinicio(true)}>
            Reiniciar Dia
          </button>
        </div>

        {loading
          ? <div className="loading"><div className="spinner"/><span>Cargando...</span></div>

          : tab==='hoy' ? <>
              <ResumenDia visitas={visitas}/>
              <div className="card">
                <div className="card-titulo">Visitas de hoy ({visitas.length})</div>
                {visitas.length===0
                  ? <div className="empty-state" style={{padding:'20px 0'}}><div className="empty-icon">📋</div>Sin visitas aun</div>
                  : visitas.map(v=>{
                      const cl=clientes.find(c=>c.id===v.cliente_id);
                      return (
                        <div key={v.id} className="historial-item">
                          <div>
                            <div style={{fontWeight:800,fontSize:14}}>{cl?cl.nombre:'Cliente'}</div>
                            <div style={{fontSize:12,color:'var(--gris-dark)',fontWeight:600}}>
                              {v.ruta}
                              {v.dejo_botellon?' · '+(v.cantidad_botellones||1)+' bot.':''}
                              {v.fue_fiado?' · Fiado':''}
                              {v.presto_botellon?' · Prestado':''}
                            </div>
                          </div>
                          <div style={{textAlign:'right'}}>
                            {v.pago_monto>0 && <div style={{fontWeight:900,color:'var(--verde)',fontSize:15}}>{fmt(v.pago_monto)}</div>}
                            {v.tipo_pago==='transferencia' && <div style={{fontSize:11,color:'var(--azul)',fontWeight:700}}>Transferencia</div>}
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            </>

          : tab==='clientes' ? <>
              <button className="btn-nuevo" onClick={()=>setNuevo(true)}>+ Nuevo cliente</button>
              <input type="text" className="search-box" placeholder="Buscar por nombre o ruta..."
                value={buscar} onChange={e=>setBuscar(e.target.value)}/>
              <div style={{fontSize:13,color:'var(--gris-dark)',fontWeight:700,marginBottom:10}}>
                {clFiltrados.length} clientes
              </div>
              {clFiltrados.map(c=>(
                <div key={c.id} className="admin-cliente">
                  <div className="admin-cliente-info">
                    <div className="admin-cliente-nombre">
                      <span style={{color:'var(--azul)',fontFamily:"'Space Mono',monospace",marginRight:6,fontSize:12}}>#{c.orden||'?'}</span>
                      {c.nombre}
                    </div>
                    <div className="admin-cliente-ruta">
                      {c.ruta} · {fmt(c.precio)}
                      {c.deuda_actual>0?' · Debe '+fmt(c.deuda_actual):''}
                      {c.botellones_prestados>0?' · '+c.botellones_prestados+' prestado(s)':''}
                    </div>
                  </div>
                  <button className="btn-editar" onClick={()=>setClienteEdit(c)}>Editar</button>
                  <button onClick={()=>setClienteAEliminar(c)}
                    style={{background:'var(--rojo-light)',color:'var(--rojo)',border:'none',borderRadius:10,padding:'8px 12px',fontSize:13,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito',sans-serif",flexShrink:0}}>
                    Eliminar
                  </button>
                </div>
              ))}
            </>

          : <div className="card">
              <div className="card-titulo">Vendedores — resumen de hoy</div>
              {vendedores.map(v=>{
                const visV=visitas.filter(vi=>vi.vendedor_id===v.id);
                const recV=visV.reduce((s,vi)=>s+(vi.pago_monto||0),0);
                return (
                  <div key={v.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:'1px solid #F0F2F8'}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:16}}>{v.nombre}</div>
                      <div style={{fontSize:12,color:'var(--gris-dark)',fontWeight:600}}>PIN: {v.pin} · {visV.length} visitas hoy</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontWeight:900,fontSize:18,color:'var(--verde)'}}>{fmt(recV)}</div>
                      <div style={{fontSize:11,color:'var(--gris-dark)'}}>recaudado hoy</div>
                    </div>
                  </div>
                );
              })}
            </div>
        }
      </div>

      {clienteEdit  && <ModalCliente cliente={clienteEdit} rutas={rutas} onClose={()=>setClienteEdit(null)} onGuardar={editarCliente}/>}
      {nuevoCliente && <ModalCliente cliente={null} rutas={rutas} onClose={()=>setNuevo(false)} onGuardar={crearCliente}/>}
      {showReinicio && <ModalReiniciarDia
        visitas={visitas} clientes={clientes}
        onClose={()=>setShowReinicio(false)}
        onReiniciado={()=>{ setShowReinicio(false); setVisitas([]); }}
      />}
      {showHistorial && <ModalHistorial clientes={clientes} onClose={()=>setShowHist(false)}/>}
      {clienteAEliminar && <ModalEliminarCliente
        cliente={clienteAEliminar}
        onClose={()=>setClienteAEliminar(null)}
        onEliminar={async ()=>{
          await sb('clientes','PATCH',{activo:false},'?id=eq.'+clienteAEliminar.id);
          setClientes(prev=>prev.filter(c=>c.id!==clienteAEliminar.id));
          setClienteAEliminar(null);
        }}
      />}
    </div>
  );
}


// ============================================================
// MODAL ELIMINAR CLIENTE
// ============================================================
function ModalEliminarCliente({ cliente, onClose, onEliminar }) {
  const [pin,   setPin]   = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLd]  = React.useState(false);
  const PIN_OK = '2205';

  const addNum = (n) => {
    if (pin.length>=4) return;
    const np = pin+n;
    setPin(np);
    if (np.length===4) {
      if (np===PIN_OK) {
        setError('');
        setLd(true);
        onEliminar().finally(()=>setLd(false));
      } else {
        setError('PIN incorrecto');
        setPin('');
      }
    }
  };

  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-titulo">Eliminar Cliente</div>
        <div className="modal-sub">Esta accion desactivara al cliente de todas las rutas</div>

        <div style={{background:'var(--rojo-light)',borderRadius:12,padding:'14px 16px',marginBottom:20}}>
          <div style={{fontWeight:900,color:'var(--rojo)',fontSize:15,marginBottom:4}}>{cliente.nombre}</div>
          <div style={{fontSize:13,color:'var(--rojo)'}}>Ruta: {cliente.ruta} · #{cliente.orden||'?'}</div>
        </div>

        <div className="login-label" style={{textAlign:'center',marginBottom:12}}>Ingresa el PIN para confirmar</div>
        <div className="pin-display">
          {[0,1,2,3].map(i=><div key={i} className={'pin-dot'+(i<pin.length?'':' empty')}>{i<pin.length?'*':''}</div>)}
        </div>
        <div className="numpad">
          {[1,2,3,4,5,6,7,8,9].map(n=>(
            <button key={n} className="num-btn" onClick={()=>addNum(String(n))}>{n}</button>
          ))}
          <button className="num-btn del" onClick={()=>{ setPin(p=>p.slice(0,-1)); setError(''); }}>DEL</button>
          <button className="num-btn" onClick={()=>addNum('0')}>0</button>
          <button className="num-btn ok" disabled={loading}>{loading?'...':'OK'}</button>
        </div>
        {error && <div className="login-error" style={{marginTop:12}}>{error}</div>}
        <button className="btn-cancelar" style={{marginTop:16}} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

// ============================================================
// LOGIN
// ============================================================
function Login({ onLogin }) {
  const [who,     setWho]     = React.useState('vendedor');
  const [pin,     setPin]     = React.useState('');
  const [error,   setError]   = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const addNum = async (n) => {
    if (pin.length>=4) return;
    const np = pin+n;
    setPin(np);
    if (np.length===4) {
      setLoading(true); setError('');
      try {
        if (who==='admin') {
          if (np==='0000') onLogin({tipo:'admin',nombre:'Administrador'});
          else { setError('PIN incorrecto'); setPin(''); }
        } else {
          const data = await sb('vendedores','GET',null,'?pin=eq.'+np+'&activo=eq.true');
          if (data&&data.length>0) onLogin({tipo:'vendedor',...data[0]});
          else { setError('PIN incorrecto'); setPin(''); }
        }
      } catch(e) { setError('Error de conexion'); }
      setLoading(false);
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-logo">💧</div>
      <div className="login-title">Ruta del Agua</div>
      <div className="login-sub">Sistema de distribucion</div>
      <div className="login-card">
        <div className="login-label">Quien eres?</div>
        <div className="login-selector">
          <div className={'login-option'+(who==='vendedor'?' active':'')} onClick={()=>{ setWho('vendedor'); setPin(''); setError(''); }}>Vendedor</div>
          <div className={'login-option'+(who==='admin'?   ' active':'')} onClick={()=>{ setWho('admin');   setPin(''); setError(''); }}>Admin</div>
        </div>
        <div className="login-label">Ingresa tu PIN</div>
        <div className="pin-display">
          {[0,1,2,3].map(i=><div key={i} className={'pin-dot'+(i<pin.length?'':' empty')}>{i<pin.length?'*':''}</div>)}
        </div>
        <div className="numpad">
          {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} className="num-btn" onClick={()=>addNum(String(n))}>{n}</button>)}
          <button className="num-btn del" onClick={()=>{ setPin(p=>p.slice(0,-1)); setError(''); }}>DEL</button>
          <button className="num-btn" onClick={()=>addNum('0')}>0</button>
          <button className="num-btn ok" disabled={loading}>{loading?'...':'OK'}</button>
        </div>
        {error && <div className="login-error">{error}</div>}
        {who==='admin' && <div style={{marginTop:14,fontSize:12,color:'#aaa',textAlign:'center'}}>PIN admin: 0000</div>}
      </div>
    </div>
  );
}

// ============================================================
// APP PRINCIPAL
// ============================================================
function App() {
  const [user, setUser] = React.useState(null);
  if (!user) return <Login onLogin={setUser}/>;
  if (user.tipo==='admin') return <AdminApp onLogout={()=>setUser(null)}/>;
  return <VendedorApp user={user} onLogout={()=>setUser(null)}/>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
