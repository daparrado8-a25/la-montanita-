<style>

.btn-ed{background:var(--azul-light);color:var(--azul);border:none;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0;}

.hi{background:var(--gris);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.btn-nv{width:100%;padding:16px;border-radius:14px;border:2.5px dashed var(--azul);background:var(--azul-light);color:var(--azul);font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;margin-bottom:16px;}

.badm{display:flex;gap:10px;margin-bottom:14px;}
.badm-btn{flex:1;padding:13px;border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;text-align:center;border-width:2px;border-style:solid;}
.badm-h{border-color:var(--azul);background:var(--azul-light);color:var(--azul);}

.border-num{flex-shrink:0;background:var(--azul);color:white;border-radius:8px;padding:2px 8px;font-size:12px;font-weight:900;font-family:'Space Mono',monospace;}

<body>
<div id="root"></div>
<script>
'use strict';
var h  = React.createElement;
var us = React.useState;
var ue = React.useEffect;

var SB_URL = 'https://atwikmqtbpeupavgfsoq.supabase.co';
var SB_KEY = 'sb_publishable_qpLgYF143fxiE4xzyZJu1w_brRBSVzh';

async function sb(table, method, body, query) {
  var res = await fetch(SB_URL+'/rest/v1/'+table+(query||''), {
    method: method||'GET',
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json','Prefer':'return=representation'
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) throw new Error(await res.text());
  var t = await res.text();
  return t ? JSON.parse(t) : null;
}

var fmt  = function(n){ return '$'+Number(n||0).toLocaleString('es-CO'); };
var hoy  = function(){ return new Date().toISOString().split('T')[0]; };
var noop = function(){};

/* ── PDF ── */
function generarPDF(visitas, clientes, fecha) {
  var rec=0,fiad=0,efe=0,tra=0,bv=0,bf=0,bp=0;
  visitas.forEach(function(v){
    rec+=v.pago_monto||0; fiad+=v.monto_fiado||0;
    if(v.tipo_pago==='efectivo') efe+=v.pago_monto||0;
    if(v.tipo_pago==='transferencia') tra+=v.pago_monto||0;
    if(v.dejo_botellon&&!v.fue_fiado) bv+=v.cantidad_botellones||1;
    if(v.fue_fiado) bf+=v.cantidad_botellones||1;
    if(v.presto_botellon) bp++;
  });
  var filas=visitas.map(function(v){
    var cl=clientes.find(function(c){return c.id===v.cliente_id;});
    var nom=(cl?cl.nombre:'').replace(/</g,'&lt;');
    var det=[];
    if(v.dejo_botellon) det.push((v.cantidad_botellones||1)+' bot.');
    if(v.fue_fiado) det.push('FIADO');
    if(v.presto_botellon) det.push('Prestado');
    var color=v.pago_monto>0?'#00C853':'#FF9500';
    var val=v.pago_monto>0?fmt(v.pago_monto):(v.fue_fiado?'Fiado':'-');
    return '<tr><td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;">'+nom+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;color:#888;">'+(v.ruta||'')+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;">'+det.join(', ')+'</td>'+
      '<td style="padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;text-align:right;font-weight:700;color:'+color+';">'+val+'</td></tr>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Resumen '+fecha+'</title>'+
    '<style>body{font-family:Arial,sans-serif;padding:24px;color:#1A1F2E;}h1{color:#0066FF;}'+
    '.g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;}'+
    '.b{border-radius:10px;padding:14px;text-align:center;}.b .n{font-size:28px;font-weight:900;}.b .l{font-size:11px;font-weight:700;margin-top:4px;}'+
    '.gv{background:#E8FFF0;color:#00C853;}.gn{background:#FFF8E8;color:#FF9500;}.gr{background:#FFF0EF;color:#FF3B30;}.ga{background:#E8F0FF;color:#0066FF;}'+
    'table{width:100%;border-collapse:collapse;}th{background:#0066FF;color:white;padding:8px;font-size:12px;text-align:left;}'+
    '.t{border-top:2px solid #0066FF;padding-top:14px;margin-top:16px;}'+
    '.r{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;}'+
    '.r.big{font-weight:900;font-size:20px;color:#0066FF;border:none;margin-top:8px;}'+
    '@media print{.np{display:none!important;}}</style></head><body>'+
    '<h1>Ruta del Agua - Resumen del Dia</h1><p style="color:#888;">'+fecha+' | '+visitas.length+' visitas</p>'+
    '<div class="g">'+
      '<div class="b gv"><div class="n">'+bv+'</div><div class="l">VENDIDOS</div></div>'+
      '<div class="b gn"><div class="n">'+bf+'</div><div class="l">FIADOS</div></div>'+
      '<div class="b gr"><div class="n">'+bp+'</div><div class="l">PRESTADOS</div></div>'+
      '<div class="b ga"><div class="n">'+(bv+bf+bp)+'</div><div class="l">TOTAL</div></div>'+
    '</div>'+
    '<table><thead><tr><th>Cliente</th><th>Ruta</th><th>Detalle</th><th>Valor</th></tr></thead><tbody>'+filas+'</tbody></table>'+
    '<div class="t">'+
      '<div class="r"><span>Efectivo</span><span style="color:#00C853;font-weight:700;">'+fmt(efe)+'</span></div>'+
      '<div class="r"><span>Transferencias</span><span style="color:#0066FF;font-weight:700;">'+fmt(tra)+'</span></div>'+
      '<div class="r"><span>Fiado</span><span style="color:#FF9500;font-weight:700;">'+fmt(fiad)+'</span></div>'+
      '<div class="r big"><span>TOTAL RECAUDADO</span><span>'+fmt(rec)+'</span></div>'+
    '</div>'+
    '<br><button class="np" onclick="window.print()" style="background:#0066FF;color:white;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;">Guardar PDF</button>'+
    '</body></html>';
  var win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

/* ── NUMPAD ── */
function Numpad(p) {
  function add(n) {
    if(p.pin.length>=4) return;
    var np=p.pin+n;
    p.setPin(np);
    if(np.length===4) p.onDone(np);
  }
  return h('div',null,
    h('div',{className:'pin-display'},
      [0,1,2,3].map(function(i){
        return h('div',{key:i,className:'pin-dot'+(i<p.pin.length?'':' empty')},i<p.pin.length?'*':'');
      })
    ),
    h('div',{className:'numpad'},
      [1,2,3,4,5,6,7,8,9].map(function(n){
        return h('button',{key:n,className:'num-btn',onClick:function(){add(String(n));}},n);
      }),
      h('button',{className:'num-btn del',onClick:function(){p.setPin(function(x){return x.slice(0,-1);});if(p.setErr)p.setErr('');}}, 'DEL'),
      h('button',{className:'num-btn',onClick:function(){add('0');}}, '0'),
      h('button',{className:'num-btn ok'}, 'OK')
    )
  );
}

/* ── RESUMEN DIA ── */
function ResumenDia(p) {
  var V=p.visitas;
  var rec=0,fiad=0,efe=0,tra=0,bv=0,bf=0,bp=0;
  V.forEach(function(v){
    rec+=v.pago_monto||0; fiad+=v.monto_fiado||0;
    if(v.tipo_pago==='efectivo') efe+=v.pago_monto||0;
    if(v.tipo_pago==='transferencia') tra+=v.pago_monto||0;
    if(v.dejo_botellon&&!v.fue_fiado) bv+=v.cantidad_botellones||1;
    if(v.fue_fiado) bf+=v.cantidad_botellones||1;
    if(v.presto_botellon) bp++;
  });
  return h('div',null,
    h('div',{className:'card'},
      h('div',{className:'card-titulo'},'Botellones del dia'),
      h('div',{className:'resumen-bot'},

function Login(p) {

  async function onDone(np){

    try{
      if(w==='admin'){
        if(np==='0000')p.onLogin({tipo:'admin',nombre:'Administrador'});
        else{sErr('PIN incorrecto');sPin('');}
      }else{
        var data=await sb('vendedores','GET',null,'?pin=eq.'+np+'&activo=eq.true');
        if(data&&data.length>0)p.onLogin(Object.assign({tipo:'vendedor'},data[0]));

  return h('div',{className:'login-wrap'},
    h('div',{className:'login-logo'},'💧'),
    h('div',{className:'login-title'},'Ruta del Agua'),
    h('div',{className:'login-sub'},'Sistema de distribucion'),
    h('div',{className:'login-card'},
      h('div',{className:'login-label'},'Quien eres?'),

        h('div',{className:'login-option'+(w==='admin'?' active':''),onClick:function(){sW('admin');sPin('');sErr('');}},'Admin')
      ),
      h('div',{className:'login-label'},'Ingresa tu PIN'),
      h(Numpad,{pin:pin,setPin:sPin,setErr:sErr,onDone:onDone}),
      err?h('div',{className:'login-error'},err):null,
      w==='admin'?h('div',{style:{marginTop:14,fontSize:12,color:'#aaa',textAlign:'center'}},'PIN admin: 0000'):null
    )
  );
}

/* ── APP ── */
function App() {
  var _u=us(null); var u=_u[0],sU=_u[1];
